name: React Native Harness

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - main
    tags:
      - 'v*'
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  harness:
    name: Harness (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            os: ubuntu-latest
            app: android/app/build/outputs/apk/debug/app-debug.apk
          - platform: ios
            os: macos-26
            app: ios/build/Build/Products/Debug-iphonesimulator/VoelDev.app
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}
      TURBO_TELEMETRY_DISABLED: 1
      DO_NOT_TRACK: 1
      RELEASE_CHANNEL: dev
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Generate Android project
        if: matrix.platform == 'android'
        working-directory: apps/client
        run: bun expo prebuild --platform android --clean --no-install

      - name: Generate iOS project
        if: matrix.platform == 'ios'
        working-directory: apps/client
        run: bun expo prebuild --platform ios --clean --no-install

      - name: Generate native fingerprint
        id: native-fingerprint
        working-directory: apps/client
        run: |
          hash="$(bunx @expo/fingerprint fingerprint:generate --platform "${{ matrix.platform }}" | jq -r .hash)"
          echo "Native fingerprint: $hash"
          echo "hash=$hash" >> "$GITHUB_OUTPUT"

      - name: Restore iOS app cache
        if: matrix.platform == 'ios'
        id: cache-ios-app-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/client/${{ matrix.app }}
          key: ios-app-${{ runner.os }}-${{ runner.arch }}-${{ steps.native-fingerprint.outputs.hash }}

      - name: Check iOS app build output
        if: matrix.platform == 'ios'
        id: ios-app-build-output
        run: |
          app_path="apps/client/${{ matrix.app }}"

          if [ "${{ steps.cache-ios-app-restore.outputs.cache-hit }}" = "true" ] && [ -d "$app_path" ] && [ -f "$app_path/Info.plist" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Using cached iOS app at $app_path"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore Android Gradle build cache
        if: matrix.platform == 'android'
        id: cache-android-gradle-build-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            apps/client/android/.gradle
            apps/client/android/build
            apps/client/android/app/build
          key: android-gradle-build-x86_64-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}
          restore-keys: |
            android-gradle-build-x86_64-${{ runner.os }}-

      - name: Check Android Gradle build output
        if: matrix.platform == 'android'
        id: android-gradle-build-output
        run: |
          app_path="apps/client/${{ matrix.app }}"

          if [ "${{ steps.cache-android-gradle-build-restore.outputs.cache-hit }}" = "true" ] && [ -f "$app_path" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Using cached Android app at $app_path"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: matrix.platform == 'android' && steps.android-gradle-build-output.outputs.ready != 'true'
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '17'
          distribution: temurin

      - name: Setup Gradle
        if: matrix.platform == 'android' && steps.android-gradle-build-output.outputs.ready != 'true'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        with:
          cache-read-only: false

      - name: Install Android ccache
        if: matrix.platform == 'android' && steps.android-gradle-build-output.outputs.ready != 'true'
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y ccache

      - name: Install iOS ccache
        if: matrix.platform == 'ios' && steps.ios-app-build-output.outputs.ready != 'true'
        run: brew install ccache

      - name: Setup ccache
        if: (matrix.platform == 'android' && steps.android-gradle-build-output.outputs.ready != 'true') || (matrix.platform == 'ios' && steps.ios-app-build-output.outputs.ready != 'true')
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          create-symlink: false
          key: ${{ runner.os }}-${{ matrix.platform }}-${{ steps.native-fingerprint.outputs.hash }}
          restore-keys: ${{ runner.os }}-${{ matrix.platform }}-
          max-size: 5G
          save: true
          append-timestamp: true
        env:
          CCACHE_DIR: ${{ runner.temp }}/ccache

      - name: Configure ccache
        if: (matrix.platform == 'android' && steps.android-gradle-build-output.outputs.ready != 'true') || (matrix.platform == 'ios' && steps.ios-app-build-output.outputs.ready != 'true')
        run: |
          ccache_dir="${{ runner.temp }}/ccache"
          mkdir -p "$ccache_dir"
          echo "CCACHE_DIR=$ccache_dir" >> "$GITHUB_ENV"
          echo "CCACHE_CONFIGPATH=$ccache_dir/ccache.conf" >> "$GITHUB_ENV"
          echo "USE_CCACHE=1" >> "$GITHUB_ENV"
          echo "CCACHE_SLOPPINESS=clang_index_store,file_macro,file_stat_matches,include_file_mtime,include_file_ctime,ivfsoverlay,modules,pch_defines,system_headers,time_macros" >> "$GITHUB_ENV"
          echo "CCACHE_FILECLONE=true" >> "$GITHUB_ENV"
          echo "CCACHE_DEPEND=true" >> "$GITHUB_ENV"
          echo "CCACHE_INODECACHE=true" >> "$GITHUB_ENV"
          export CCACHE_DIR="$ccache_dir"
          export CCACHE_CONFIGPATH="$ccache_dir/ccache.conf"
          ccache --max-size=5G
          ccache --set-config=compiler_check="%compiler% --version"
          ccache --zero-stats
          ccache --show-config

      - name: Build Android app
        if: matrix.platform == 'android' && steps.android-gradle-build-output.outputs.ready != 'true'
        working-directory: apps/client/android
        run: ./gradlew assembleDebug --build-cache --parallel --stacktrace -Dorg.gradle.jvmargs=-Xmx6144M -PreactNativeArchitectures=x86_64 --no-daemon
        env:
          CMAKE_C_COMPILER_LAUNCHER: /usr/bin/ccache
          CMAKE_CXX_COMPILER_LAUNCHER: /usr/bin/ccache

      - name: Android ccache stats
        if: always() && matrix.platform == 'android' && steps.android-gradle-build-output.outputs.ready == 'false'
        run: ccache --show-stats --verbose || true

      - name: Restore Android SDK emulator cache
        if: matrix.platform == 'android'
        id: cache-android-sdk-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /usr/local/lib/android/sdk/emulator
            /usr/local/lib/android/sdk/system-images/android-35/default/x86_64
          key: android-sdk-emulator-${{ runner.os }}-api-35-default-x86_64-v1
          restore-keys: |
            android-sdk-emulator-${{ runner.os }}-api-35-default-x86_64-

      - name: Enable iOS ccache
        if: matrix.platform == 'ios' && steps.ios-app-build-output.outputs.ready != 'true'
        working-directory: apps/client
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('ios/Podfile.properties.json')
          data = json.loads(path.read_text())
          data['apple.ccacheEnabled'] = 'true'
          path.write_text(json.dumps(data, indent=2) + '\n')
          print(path.read_text())
          PY

      - name: Restore CocoaPods cache
        if: matrix.platform == 'ios' && steps.ios-app-build-output.outputs.ready != 'true'
        id: cache-pods-restore
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: pods-${{ runner.os }}-${{ steps.native-fingerprint.outputs.hash }}
          restore-keys: |
            pods-${{ runner.os }}-

      - name: Install CocoaPods
        if: matrix.platform == 'ios' && steps.ios-app-build-output.outputs.ready != 'true'
        working-directory: apps/client/ios
        run: pod install

      - name: Build iOS app
        if: matrix.platform == 'ios' && steps.ios-app-build-output.outputs.ready != 'true'
        working-directory: apps/client
        run: |
          mkdir -p .ci
          ccache_bin="$(command -v ccache)"
          cat > .ci/ccache-clang.sh <<'SH'
          #!/bin/sh
          SH
          echo "exec \"$ccache_bin\" clang \"\$@\"" >> .ci/ccache-clang.sh
          cat > .ci/ccache-clang++.sh <<'SH'
          #!/bin/sh
          SH
          echo "exec \"$ccache_bin\" clang++ \"\$@\"" >> .ci/ccache-clang++.sh
          chmod +x .ci/ccache-clang.sh .ci/ccache-clang++.sh

          xcodebuild \
            -workspace ios/VoelDev.xcworkspace \
            -scheme VoelDev \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -parallelizeTargets \
            -jobs $(sysctl -n hw.ncpu) \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEBUG_INFORMATION_FORMAT=dwarf \
            CLANG_ENABLE_EXPLICIT_MODULES=NO \
            ONLY_ACTIVE_ARCH=YES \
            CC="$PWD/.ci/ccache-clang.sh" \
            CXX="$PWD/.ci/ccache-clang++.sh" \
            LD="$PWD/.ci/ccache-clang.sh" \
            LDPLUSPLUS="$PWD/.ci/ccache-clang++.sh" \
            build

      - name: iOS ccache stats
        if: always() && matrix.platform == 'ios' && steps.ios-app-build-output.outputs.ready != 'true'
        run: ccache --show-stats --verbose || true

      - name: Save iOS app cache
        if: matrix.platform == 'ios' && steps.ios-app-build-output.outputs.ready != 'true' && steps.cache-ios-app-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: apps/client/${{ matrix.app }}
          key: ${{ steps.cache-ios-app-restore.outputs.cache-primary-key }}

      - name: Save Android Gradle build cache
        if: matrix.platform == 'android' && steps.cache-android-gradle-build-restore.outputs.cache-hit != 'true' && steps.cache-android-gradle-build-restore.outputs.cache-primary-key != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            apps/client/android/.gradle
            apps/client/android/build
            apps/client/android/app/build
          key: ${{ steps.cache-android-gradle-build-restore.outputs.cache-primary-key }}

      - name: Save CocoaPods cache
        if: matrix.platform == 'ios' && steps.ios-app-build-output.outputs.ready != 'true' && steps.cache-pods-restore.outputs.cache-hit != 'true' && steps.cache-pods-restore.outputs.cache-primary-key != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/Library/Caches/CocoaPods
            ~/.cocoapods
          key: ${{ steps.cache-pods-restore.outputs.cache-primary-key }}

      - name: Run test server controller
        working-directory: apps/client
        run: bun run test-server > test-server-controller.log 2>&1 &

      - name: Prepare Harness cache directory
        working-directory: apps/client
        run: mkdir -p .harness/cache

      - name: Run React Native Harness
        uses: callstackincubator/react-native-harness@a8b0bfd3243ef845f9ce4eaa69fb1ebb8e3275d9 # main, latest action for react-native-harness 1.3.0
        with:
          app: ${{ matrix.app }}
          runner: ${{ matrix.platform }}
          projectRoot: apps/client
          packageManager: bun
          cacheAvd: true
          afterRunHook: |
            echo "Harness finished with exit code: $HARNESS_EXIT_CODE"

      - name: Save Android SDK cache
        if: matrix.platform == 'android' && steps.cache-android-sdk-restore.outputs.cache-hit != 'true' && steps.cache-android-sdk-restore.outputs.cache-primary-key != ''
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /usr/local/lib/android/sdk/emulator
            /usr/local/lib/android/sdk/system-images/android-35/default/x86_64
          key: ${{ steps.cache-android-sdk-restore.outputs.cache-primary-key }}

      - name: Upload test server controller log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-server-controller-${{ matrix.platform }}
          path: apps/client/test-server-controller.log
          if-no-files-found: ignore
