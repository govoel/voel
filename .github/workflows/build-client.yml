name: Build Client

on:
  pull_request:
    paths:
      - 'apps/client/**'
      # We don't need to build the client when server changes
      # even though it is in the package.json because only types
      # are imported. A typecheck should be good enough.
      # - 'apps/server/**'
      - 'packages/schemas/**'
    branches:
      - '*'
  push:
    paths:
      - 'apps/client/**'
      # We don't need to build the client when server changes
      # even though it is in the package.json because only types
      # are imported. A typecheck should be good enough.
      # - 'apps/server/**'
      - 'packages/schemas/**'
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  # Only cancel in-progress runs for pull_request events
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  android-app:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: ./.github/actions/setup-bun
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          create-symlink: true
          key: ccache-${{ runner.os }}-${{ github.job }}
      - name: Find Metro Cache
        id: metro-cache-dir-path
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const os = require('os');
            const path = require('path');
            return path.join(os.tmpdir(), 'metro-cache');
      - name: Restore Metro cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.metro-cache-dir-path.outputs.result }}
          key: metro-cache-${{ runner.os }}-${{ github.job }}-${{ github.ref }}
          restore-keys: |
            metro-cache-${{ runner.os }}-${{ github.job }}-${{ github.base_ref }}
            metro-cache-${{ runner.os }}-${{ github.job }}-
      - name: Decode Signing Keystore
        working-directory: apps/client
        run: echo $VOEL_ANDROID_APP_JKS_FILE | base64 --decode > app.voel.android.jks
        env:
          VOEL_ANDROID_APP_JKS_FILE: ${{ secrets.VOEL_ANDROID_APP_JKS_FILE }}
      - name: Generate Native Module
        working-directory: apps/client
        run: bun run prebuild --platform android
      - name: Build Android Debug App
        working-directory: apps/client/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug --build-cache --parallel
        env:
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          CCACHE_COMPILERCHECK: content
          NDK_CCACHE: /usr/bin/ccache
          NODE_ENV: development
      - name: Upload Debug Android App
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: apps/client/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
      - name: Build Android Release App
        working-directory: apps/client/android
        run: chmod +x ./gradlew && ./gradlew assembleRelease --build-cache --parallel
        env:
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          CCACHE_COMPILERCHECK: content
          NDK_CCACHE: /usr/bin/ccache
          NODE_ENV: production
      - name: Upload Release Android App
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release
          path: apps/client/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
