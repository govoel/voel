name: Build Client

on:
  pull_request:
    types:
      - labeled
      - opened
      - synchronize
      - reopened
    branches:
      - '*'
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  # Only cancel in-progress runs for pull_request events
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # we use this so that required checks work properly, and so that PR merge commits don't trigger builds again
  should-skip:
    runs-on: self-hosted

    if: (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build-client')) || github.event_name == 'push'

    permissions:
      contents: read
      actions: write

    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}

    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@f75f66ce1886f00957d99748a42c724f4330bdcf # v5.3.1
        with:
          # We don't need to build the client when server changes
          # even though it is in the package.json because only types
          # are imported. A typecheck should be good enough.
          paths: '["apps/client/**", "packages/schemas/**", ".github/workflows/build-client.yml", ".github/actions/setup-bun/action.yml"]'
          cancel_others: 'false'
          concurrent_skipping: 'never'
          skip_after_successful_duplicate: 'true'

  android-app:
    runs-on: self-hosted

    needs:
      - should-skip

    if: needs.should-skip.outputs.should_skip != 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 'lts/*'

      - name: Generate Debug Runtime Version
        id: debug-runtimeversion
        working-directory: apps/client
        env:
          RELEASE_CHANNEL: development
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          NODE_ENV: development
        run: |
          HASH="$(bun run --silent runtimeversion:android)"
          echo "Debug runtime version is: $HASH"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

          if wget --quiet --spider https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/debug/android/$HASH/app-arm64-v8a-debug.apk ; then
            echo "Debug Android APKs for this runtime version exist"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Debug Android APKs for this runtime version do not exist"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Preview Runtime Version
        id: preview-runtimeversion
        working-directory: apps/client
        env:
          RELEASE_CHANNEL: preview
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          NODE_ENV: production
        run: |
          HASH="$(bun run --silent runtimeversion:android:preview)"
          echo "Preview runtime version is: $HASH"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

          if wget --quiet --spider https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/preview/android/$HASH/app-arm64-v8a-release.apk ; then
            echo "Preview Android APKs for this runtime version exist"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Preview Android APKs for this runtime version do not exist"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        if: steps.debug-runtimeversion.outputs.exists == 'false' || steps.preview-runtimeversion.outputs.exists == 'false'
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@4d9f0ba0025fe599b4ebab900eb7f3a1d93ef4c2 # v5.0.0
        if: steps.debug-runtimeversion.outputs.exists == 'false' || steps.preview-runtimeversion.outputs.exists == 'false'
        with:
          cache-read-only: false

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        if: steps.debug-runtimeversion.outputs.exists == 'false' || steps.preview-runtimeversion.outputs.exists == 'false'
        with:
          packages: ''

      - name: Find ccache directory
        id: ccache-dir-path
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        if: steps.debug-runtimeversion.outputs.exists == 'false' || steps.preview-runtimeversion.outputs.exists == 'false'
        with:
          result-encoding: string
          script: |
            const os = require('os');
            const path = require('path');
            return path.join(os.homedir(), '.cache', 'ccache');

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@bfa03e1de4d7f7c3e80ad9109feedd05c4f5a716 # v1.2.19
        if: steps.debug-runtimeversion.outputs.exists == 'false' || steps.preview-runtimeversion.outputs.exists == 'false'
        with:
          create-symlink: false
          key: ${{ runner.os }}-${{ github.job }}
        env:
          CCACHE_DIR: ${{ steps.ccache-dir-path.outputs.result }}

      - name: Configure ccache
        if: steps.debug-runtimeversion.outputs.exists == 'false' || steps.preview-runtimeversion.outputs.exists == 'false'
        run: |
          /usr/bin/ccache --set-config=compiler_check="%compiler% --version"
          /usr/bin/ccache -p

      - name: Find Metro Cache
        id: metro-cache-dir-path
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        if: steps.debug-runtimeversion.outputs.exists == 'false' || steps.preview-runtimeversion.outputs.exists == 'false'
        with:
          result-encoding: string
          script: |
            const os = require('os');
            const path = require('path');
            return path.join(os.tmpdir(), 'metro-cache');

      - name: Restore Metro cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        if: steps.debug-runtimeversion.outputs.exists == 'false' || steps.preview-runtimeversion.outputs.exists == 'false'
        with:
          path: ${{ steps.metro-cache-dir-path.outputs.result }}
          key: metro-cache-${{ runner.os }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            metro-cache-${{ runner.os }}-${{ github.job }}-

      - name: Decode Signing Keystore
        if: steps.debug-runtimeversion.outputs.exists == 'false' || steps.preview-runtimeversion.outputs.exists == 'false'
        working-directory: apps/client
        run: echo $VOEL_ANDROID_APP_JKS_FILE | base64 --decode > app.voel.android.jks
        env:
          VOEL_ANDROID_APP_JKS_FILE: ${{ secrets.VOEL_ANDROID_APP_JKS_FILE }}

      - name: Generate Native Debug Module
        if: steps.debug-runtimeversion.outputs.exists == 'false'
        working-directory: apps/client
        run: bun run prebuild --platform android --clean

      - name: Build Android Debug App
        if: steps.debug-runtimeversion.outputs.exists == 'false'
        working-directory: apps/client/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug --build-cache --parallel --stacktrace -Dorg.gradle.jvmargs=-Xmx6144M
        env:
          RELEASE_CHANNEL: development
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          CMAKE_C_COMPILER_LAUNCHER: /usr/bin/ccache
          CMAKE_CXX_COMPILER_LAUNCHER: /usr/bin/ccache
          NODE_ENV: development

      - name: Upload Debug Android App
        if: steps.debug-runtimeversion.outputs.exists == 'false'
        uses: LanceMcCarthy/Action-AzureBlobUpload@caa002d5a92f7436062e44f38031c0c3ff17011e # v3.5.0
        with:
          connection_string: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          container_name: artifacts
          source_folder: apps/client/android/app/build/outputs/apk/debug
          destination_folder: debug/android/${{ steps.debug-runtimeversion.outputs.hash }}
          fail_if_source_empty: true

      - name: Debug Android App APK Links
        run: |
          echo "Debug Android App APK Links" >> $GITHUB_STEP_SUMMARY
          echo "- [arm64-v8a](https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/debug/android/${{ steps.debug-runtimeversion.outputs.hash }}/app-arm64-v8a-debug.apk)" >> $GITHUB_STEP_SUMMARY
          echo "- [armeabi-v7a](https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/debug/android/${{ steps.debug-runtimeversion.outputs.hash }}/app-armeabi-v7a-debug.apk)" >> $GITHUB_STEP_SUMMARY
          echo "- [universal](https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/debug/android/${{ steps.debug-runtimeversion.outputs.hash }}/app-universal-debug.apk)" >> $GITHUB_STEP_SUMMARY
          echo "- [x86](https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/debug/android/${{ steps.debug-runtimeversion.outputs.hash }}/app-x86-debug.apk)" >> $GITHUB_STEP_SUMMARY
          echo "- [x86_64](https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/debug/android/${{ steps.debug-runtimeversion.outputs.hash }}/app-x86_64-debug.apk)" >> $GITHUB_STEP_SUMMARY

      - name: Generate Native Preview Module
        if: steps.preview-runtimeversion.outputs.exists == 'false'
        working-directory: apps/client
        run: bun run prebuild:preview --platform android --clean

      - name: Build Android Preview App
        if: steps.preview-runtimeversion.outputs.exists == 'false'
        working-directory: apps/client/android
        run: chmod +x ./gradlew && ./gradlew assembleRelease --build-cache --parallel --stacktrace -Dorg.gradle.jvmargs=-Xmx6144M
        env:
          RELEASE_CHANNEL: preview
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          CMAKE_C_COMPILER_LAUNCHER: /usr/bin/ccache
          CMAKE_CXX_COMPILER_LAUNCHER: /usr/bin/ccache
          NODE_ENV: production

      - name: Upload Preview Android App
        uses: LanceMcCarthy/Action-AzureBlobUpload@caa002d5a92f7436062e44f38031c0c3ff17011e # v3.5.0
        if: steps.preview-runtimeversion.outputs.exists == 'false'
        with:
          connection_string: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          container_name: artifacts
          source_folder: apps/client/android/app/build/outputs/apk/release
          destination_folder: preview/android/${{ steps.preview-runtimeversion.outputs.hash }}
          fail_if_source_empty: true

      - name: Preview Android App APK Links
        run: |
          echo "Preview Android App APK Links" >> $GITHUB_STEP_SUMMARY
          echo "- [arm64-v8a](https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/preview/android/${{ steps.preview-runtimeversion.outputs.hash }}/app-arm64-v8a-release.apk)" >> $GITHUB_STEP_SUMMARY
          echo "- [armeabi-v7a](https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/preview/android/${{ steps.preview-runtimeversion.outputs.hash }}/app-armeabi-v7a-release.apk)" >> $GITHUB_STEP_SUMMARY
          echo "- [universal](https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/preview/android/${{ steps.preview-runtimeversion.outputs.hash }}/app-universal-release.apk)" >> $GITHUB_STEP_SUMMARY
          echo "- [x86](https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/preview/android/${{ steps.preview-runtimeversion.outputs.hash }}/app-x86-release.apk)" >> $GITHUB_STEP_SUMMARY
          echo "- [x86_64](https://vlmdougbybmkenlwow.blob.core.windows.net/artifacts/preview/android/${{ steps.preview-runtimeversion.outputs.hash }}/app-x86_64-release.apk)" >> $GITHUB_STEP_SUMMARY

  ota-update:
    runs-on: ubuntu-latest

    needs:
      - should-skip

    if: needs.should-skip.outputs.should_skip != 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 'lts/*'

      - name: Find Metro Cache
        id: metro-cache-dir-path
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          result-encoding: string
          script: |
            const os = require('os');
            const path = require('path');
            return path.join(os.tmpdir(), 'metro-cache');

      - name: Restore Metro cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ steps.metro-cache-dir-path.outputs.result }}
          key: metro-cache-${{ runner.os }}-${{ github.job }}-${{ github.sha }}
          restore-keys: |
            metro-cache-${{ runner.os }}-${{ github.job }}-

      - name: Bypass Cloudflare for GitHub Action
        uses: xiaotianxt/bypass-cloudflare-for-github-action@a87c9ac0348806058904e62e5c8e70d8e37b4a65 # v1.1.1
        with:
          cf_api_token: ${{ secrets.CF_BYPASS_API_TOKEN }}
          cf_zone_id: ${{ secrets.CF_BYPASS_ZONE_ID }}

      - name: Publish Debug OTA Update
        working-directory: apps/client
        run: bun run export
        env:
          RELEASE_CHANNEL: development
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          NODE_ENV: development
          EXPO_TOKEN: ${{ secrets.EOAS_EXPO_TOKEN }}

      - name: Publish Preview OTA Update
        working-directory: apps/client
        run: bun run export:preview
        env:
          RELEASE_CHANNEL: preview
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          NODE_ENV: production
          EXPO_TOKEN: ${{ secrets.EOAS_EXPO_TOKEN }}
