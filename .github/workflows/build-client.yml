name: Build Client

on:
  pull_request:
    types:
      - labeled
      - opened
      - synchronize
      - reopened
    branches:
      - '*'
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  # Only cancel in-progress runs for pull_request events
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # we use this so that required checks work properly, and so that PR merge commits don't trigger builds again
  should-skip:
    runs-on: self-hosted

    if: (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build-client')) || github.event_name == 'push'

    permissions:
      contents: read
      actions: write
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5.3.1
        with:
          # We don't need to build the client when server changes
          # even though it is in the package.json because only types
          # are imported. A typecheck should be good enough.
          paths: '["apps/client/**", "packages/schemas/**"]'
          cancel_others: 'false'
          concurrent_skipping: 'never'
          skip_after_successful_duplicate: 'true'

  android-app:
    runs-on: self-hosted

    needs:
      - should-skip

    if: needs.should-skip.outputs.should_skip != 'true'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: ./.github/actions/setup-bun
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ''
      - name: Setup ccache
        run: |
          apt-get update && apt-get install -y ccache
          echo "Configuring ccache..."
          /usr/bin/ccache --set-config=cache_dir='~/.ccache'
          /usr/bin/ccache --set-config=compression=true
          ln -s /usr/bin/ccache /usr/local/bin/gcc
          ln -s /usr/bin/ccache /usr/local/bin/g++
          ln -s /usr/bin/ccache /usr/local/bin/cc
          ln -s /usr/bin/ccache /usr/local/bin/c++
          ln -s /usr/bin/ccache /usr/local/bin/clang
          ln -s /usr/bin/ccache /usr/local/bin/clang++
          ln -s /usr/bin/ccache /usr/local/bin/emcc
          ln -s /usr/bin/ccache /usr/local/bin/em++
          echo "Cccache config:"
          /usr/bin/ccache -p
          echo "Zeroing ccache stats..."
          /usr/bin/ccache -z
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.job }}-${{ github.ref }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.job }}-${{ github.base_ref }}
            ccache-${{ runner.os }}-${{ github.job }}-
            ccache-${{ runner.os }}-
      - name: Find Metro Cache
        id: metro-cache-dir-path
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const os = require('os');
            const path = require('path');
            return path.join(os.tmpdir(), 'metro-cache');
      - name: Restore Metro cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.metro-cache-dir-path.outputs.result }}
          key: metro-cache-${{ runner.os }}-${{ github.job }}-${{ github.ref }}
          restore-keys: |
            metro-cache-${{ runner.os }}-${{ github.job }}-${{ github.base_ref }}
            metro-cache-${{ runner.os }}-${{ github.job }}-
      - name: Decode Signing Keystore
        working-directory: apps/client
        run: echo $VOEL_ANDROID_APP_JKS_FILE | base64 --decode > app.voel.android.jks
        env:
          VOEL_ANDROID_APP_JKS_FILE: ${{ secrets.VOEL_ANDROID_APP_JKS_FILE }}
      - name: Generate Native Debug Module
        working-directory: apps/client
        run: bun run prebuild --platform android --clean
      - name: Build Android Debug App
        working-directory: apps/client/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug --build-cache --parallel --stacktrace
        env:
          APP_VARIANT: development
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          CCACHE_COMPILERCHECK: content
          NDK_CCACHE: /usr/bin/ccache
          NODE_ENV: development
      - name: Upload Debug Android App
        uses: actions/upload-artifact@v4
        with:
          name: android-app-debug
          path: apps/client/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7
      - name: Generate Native Preview Module
        working-directory: apps/client
        run: bun run prebuild:preview --platform android --clean
      - name: Build Android Preview App
        working-directory: apps/client/android
        run: chmod +x ./gradlew && ./gradlew assembleRelease --build-cache --parallel --stacktrace
        env:
          APP_VARIANT: preview
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          CCACHE_COMPILERCHECK: content
          NDK_CCACHE: /usr/bin/ccache
          NODE_ENV: production
      - name: Upload Preview Android App
        uses: actions/upload-artifact@v4
        with:
          name: android-app-preview
          path: apps/client/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7
      - name: Ccache stats
        if: always()
        run: |
          /usr/bin/ccache -s
          /usr/bin/ccache --version
