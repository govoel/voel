name: Build

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  # Only cancel in-progress runs for pull_request events
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  server:
    runs-on: self-hosted

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5.7.0
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Get Sharp Version from package.json
        working-directory: apps/server
        run: |
          echo "SHARP_VERSION=$(cat package.json | jq -r '.dependencies.sharp')" >> $GITHUB_ENV
      - name: Clear containers directory
        run: |
          rm -rf /var/lib/containers/
      - name: Build image
        uses: redhat-actions/buildah-build@v2.13
        with:
          layers: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          containerfiles: |
            ./Containerfile
          build-args: |
            SHARP_VERSION=${{ env.SHARP_VERSION }}
          extra-args: |
            --isolation=chroot
            --storage-driver=vfs
      - name: Push image
        env:
          REGISTRY_USERNAME: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$REGISTRY_PASSWORD" | buildah login -u $REGISTRY_USERNAME --password-stdin
          while IFS= read -r tag; do
            buildah push --storage-driver=vfs $tag docker://$tag
          done <<< $DOCKER_METADATA_OUTPUT_TAGS

