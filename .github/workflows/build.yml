name: Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  # Only cancel in-progress runs for pull_request events
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build-android-app:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [debug, release]
      fail-fast: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: ./.github/actions/setup-bun
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          create-symlink: true
          key: ccache-${{ runner.os }}-${{ github.job }}-${{ matrix.variant }}
      - name: Find Metro Cache
        id: metro-cache-dir-path
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const os = require('os');
            const path = require('path');
            return path.join(os.tmpdir(), 'metro-cache');
      - name: Restore Metro cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.metro-cache-dir-path.outputs.result }}
          key: metro-cache-${{ runner.os }}-${{ matrix.variant }}-${{ github.ref }}
          restore-keys: |
            metro-cache-${{ runner.os }}-${{ matrix.variant }}-${{ github.base_ref }}
            metro-cache-${{ runner.os }}-${{ matrix.variant }}-
      - name: Decode Signing Keystore
        working-directory: apps/client
        run: echo $VOEL_ANDROID_APP_JKS_FILE | base64 --decode > app.voel.android.jks
        env:
          VOEL_ANDROID_APP_JKS_FILE: ${{ secrets.VOEL_ANDROID_APP_JKS_FILE }}
      - name: Generate Native Module
        working-directory: apps/client
        run: bun run prebuild --platform android
      - name: Build Android Release App
        if: ${{ matrix.variant == 'release' }}
        working-directory: apps/client/android
        run: chmod +x ./gradlew && ./gradlew assembleRelease --build-cache --parallel
        env:
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          CCACHE_COMPILERCHECK: content
          NDK_CCACHE: /usr/bin/ccache
          NODE_ENV: production
      - name: Build Android Debug App
        if: ${{ matrix.variant == 'debug' }}
        working-directory: apps/client/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug --build-cache --parallel
        env:
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_PASSWORD }}
          CCACHE_COMPILERCHECK: content
          NDK_CCACHE: /usr/bin/ccache
          NODE_ENV: development
      - name: Upload Android App
        uses: actions/upload-artifact@v4
        with:
          name: android-app-${{ matrix.variant }}
          path: apps/client/android/app/build/outputs/apk/${{ matrix.variant }}/*.apk
          if-no-files-found: error
          retention-days: 7
