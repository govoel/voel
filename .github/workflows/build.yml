name: Build

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - main
    tags:
      - 'v*'
  merge_group:

concurrency:
  # Only cancel in-progress runs for pull_request events
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  build-android-app:
    runs-on: ubuntu-latest
    container: reactnativecommunity/react-native-android:latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: ./.github/actions/setup-bun
      - name: Decode secrets
        working-directory: ./apps/client
        run: echo $VOEL_ANDROID_APP_JKS_FILE | base64 --decode > app.voel.android.jks
        env:
          VOEL_ANDROID_APP_JKS_FILE: ${{ secrets.VOEL_ANDROID_APP_JKS_FILE }}
      - name: Build Android App
        working-directory: ./apps/client
        run: bun run prebuild --platform android && cd android && chmod +x ./gradlew && ./gradlew assembleRelease && ./gradlew assembleDebug
        env:
          VOEL_ANDROID_APP_JKS_PASSWORD: ${{ secrets.VOEL_ANDROID_APP_JKS_FILE }}
      - name: Upload Android App
        uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: apps/client/android/app/build/outputs/apk/(release|debug)/**.apk
