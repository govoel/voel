name: Opencode Review

permissions:
  pull-requests: write
  contents: read
  issues: write

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited]

concurrency:
  group: review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  code-review:
    runs-on: self-hosted
    timeout-minutes: 15

    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Install opencode
        shell: bash
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Setup GitHub MCP
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p $HOME/.config/opencode
          cat > $HOME/.config/opencode/opencode.json << EOF
          {
            "mcp": {
              "github": {
                "type": "remote",
                "url": "https://api.githubcopilot.com/mcp/",
                "enabled": true,
                "headers": {
                  "Authorization": "Bearer $GH_TOKEN",
                  "X-MCP-Toolsets": "repos,issues,pull_requests,git"
                }
              }
            }
          }
          EOF

      - name: Write prompt
        shell: bash
        run: |
          cat > prompt.txt << 'EOF'
          You are running automated code review in a GitHub Actions runner.

          Context:
            - Repo: ${{ github.repository }}
            - PR Number: ${{ github.event.pull_request.number }}
            - PR Head SHA: ${{ github.event.pull_request.head.sha }}
            - PR Base SHA: ${{ github.event.pull_request.base.sha }}

          Objectives:
            - Be extremely concise. Sacrifice grammar for the sake of concision.
            - Review the changes using `git` and flag only issues you're confident about:
              - Don't start by getting the entire diff, get changed files and go from there.
              - Create subagents as needed with the `task` tool to optimize your context usage.
            - After you have reviewed the changes, use the GitHub MCP server to:
              - Re-check existing comments, reply resolved, and mark resolved when addressed.
              - Use `github_pull_request_review_write` to create a pending review with a summary of the changes in the PR with diagrams using mermaid if you think it will help explain the changes.
              - For each new issue, use `github_add_comment_to_pending_review` to create comments on the pending review with:
                - The exact range of changed lines (file path + diff position). Comments MUST be placed inline on the changed line in the diff, not as top-level comments.
                - A description of the issue.
                - Proposed changes if you have a fix.
              - Finally, use `github_pull_request_review_write` again to submit the pending pull request review.

          It is extremely important to ensure you review the entire diff and check how the changes impact the codebase as a whole; read the codebase and understand the context of the changes before making any comments.
          EOF

      - name: Run opencode
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          cat prompt.txt | opencode run --model opencode/glm-4.7-free --agent build --title "Code Review"
