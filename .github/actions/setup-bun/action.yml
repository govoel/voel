name: Setup Bun
description: Setup Bun and Install Dependencies

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
      with:
        bun-version: 1.3.0
    - name: Install Dependencies
      shell: bash
      run: bun install --frozen-lockfile
